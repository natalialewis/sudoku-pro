# Daily ping to reduce free-tier Supabase pauses from inactivity.
# Add repo secret SUPABASE_PROJECT_REF (Dashboard → Project Settings → General → Reference ID).

name: Supabase keepalive

on:
  schedule:
    - cron: "42 15 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Auth /health
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          curl -fsS "https://${SUPABASE_PROJECT_REF}.supabase.co/auth/v1/health" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            | head -c 300
          echo
